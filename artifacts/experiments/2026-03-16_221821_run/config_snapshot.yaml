analysis:
  save_classification_report: true
  save_confusion_matrix: true
  top_n_errors: 50
environment:
  kaggle_input_dir: /kaggle/input/malto-hackathon
  kaggle_working_dir: /kaggle/working
  mode: local
experiment:
  enabled: true
  name_prefix: run
features:
  char_tfidf:
    analyzer: char_wb
    max_df: 0.95
    max_features: 50000
    min_df: 2
    ngram_range:
    - 2
    - 6
    sublinear_tf: true
  function_word_tfidf:
    enabled: true
    sublinear_tf: true
  stylometric:
    enabled: true
  word_tfidf:
    analyzer: word
    max_df: 0.95
    max_features: 50000
    min_df: 3
    ngram_range:
    - 1
    - 2
    sublinear_tf: true
learning_curve:
  enabled: false
  n_points: 6
models:
  best_model: ensemble_mlp
  calibrated_svc:
    C: 0.1
    class_weight: balanced
    max_iter: 2000
  complement_nb:
    alpha: 0.1
  deepseek_boost: 2.0
  lgbm:
    colsample_bytree: 0.8
    learning_rate: 0.05
    min_child_samples: 10
    n_estimators: 300
    n_svd_components: 300
    num_leaves: 31
    reg_alpha: 0.1
    reg_lambda: 0.1
    subsample: 0.8
  linear_svc:
    C: 0.1
    class_weight: null
    max_iter: 2000
  linear_svc_balanced:
    C: 0.1
    max_iter: 2000
  logistic_regression:
    C: 0.5
    class_weight: null
    max_iter: 1000
    solver: lbfgs
  logistic_regression_balanced:
    C: 0.5
    max_iter: 1000
    solver: lbfgs
  mlp:
    alpha: 0.01
    deepseek_boost_factor: 1.0
    early_stopping: true
    hidden_layer_sizes:
    - 512
    - 256
    max_iter: 300
    n_svd_components: 500
    validation_fraction: 0.1
    verbose: false
  passive_aggressive:
    C: 0.1
    class_weight: balanced
    max_iter: 1000
  ridge_classifier:
    alpha: 1.0
    class_weight: balanced
  run_models:
  - two_stage_top2
  - ensemble_mlp
  - lgbm_svd
  - ensemble_lgbm
  - mlp_svd_calibrated_sigmoid
  - stacking_lgbm
  sgd_hinge:
    alpha: 0.0001
    max_iter: 100
  sgd_log:
    alpha: 0.0001
    max_iter: 100
  two_stage_ds_threshold: 0.52
  two_stage_margin_gap: 0.4
paths:
  analysis_dir: artifacts/analysis
  artifacts_dir: artifacts
  best_model_file: artifacts/models/best_model.joblib
  data_dir: data
  experiments_dir: artifacts/experiments
  logs_dir: artifacts/logs
  metrics_dir: artifacts/metrics
  models_dir: artifacts/models
  plots_dir: artifacts/plots
  sample_submission_file: data/sample_submission.csv
  submissions_dir: artifacts/submissions
  test_file: data/test.csv
  train_file: data/train.csv
preprocessing:
  lowercase: false
  normalize_unicode: true
  remove_numbers: false
  remove_punctuation: false
  remove_repeated_spaces: true
  strip_whitespace: true
training:
  random_state: 42
  run_cv: true
  run_model_comparison: true
  save_artifacts: true
  save_per_model_submissions: true
  use_best_fold_model: false
  verbose: true
validation:
  n_splits: 5
  random_state: 42
  shuffle: true
