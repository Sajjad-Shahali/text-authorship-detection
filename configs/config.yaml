# ============================================================
# MALTO Text Authorship Detection — Configuration  (Run 10)
# ============================================================
# Run 9 results (CV OOF): ensemble_mlp=0.9360, mlp_svd=0.9354, two_stage_top2=0.9339
#   mlp_svd_calibrated FAILED (isotonic needs 500+ samples/class, DS=80) → CV=0.9193
#   mlp_svd_ds_boost FAILED (DS recall 62/80 but Grok->DS exploded to 28) → CV=0.9155
#   DS->Grok=22, Grok->DS=12 for best model — total ~34 confusion unchanged
#   Error analysis: both sets identical length (~191 chars, ~27 words) — semantic deadlock
#
# Run 10 (target: break DS/Grok deadlock with gradient boosting + stacking):
#   - lgbm_svd: TruncatedSVD(300) + LightGBM — gradient boosting, different inductive bias
#     than MLP, native class-weight, better calibrated tree probas
#   - ensemble_lgbm: soft vote lgbm_svd + two_stage_top2 (analogous to ensemble_mlp)
#   - mlp_svd_calibrated_sigmoid: sigmoid Platt scaling instead of isotonic (fix Run 9 failure)
#     sigmoid needs only 2 params per class vs isotonic's monotone function
#   - stacking_lgbm: StackingClassifier [two_stage_top2 + mlp_svd + lgbm_svd] -> LR meta
#     meta-learner learns WHEN each base model is right, not just avg their proba
#   - 2 new stylometric features (45 total): starts_with_the, clause_per_sent
# ============================================================

# -----------------------------------------------------------
# Paths
# -----------------------------------------------------------
paths:
  data_dir: "data"
  artifacts_dir: "artifacts"
  models_dir: "artifacts/models"
  metrics_dir: "artifacts/metrics"
  submissions_dir: "artifacts/submissions"
  analysis_dir: "artifacts/analysis"
  experiments_dir: "artifacts/experiments"
  logs_dir: "artifacts/logs"
  plots_dir: "artifacts/plots"

  train_file: "data/train.csv"
  test_file: "data/test.csv"
  sample_submission_file: "data/sample_submission.csv"

  best_model_file: "artifacts/models/best_model.joblib"

# -----------------------------------------------------------
# Preprocessing
# -----------------------------------------------------------
preprocessing:
  normalize_unicode: true
  strip_whitespace: true
  remove_repeated_spaces: true
  lowercase: false          # Keep False: capitalisation is a stylistic signal
  remove_punctuation: false # Keep False: punctuation is discriminative
  remove_numbers: false     # Keep False: numeric patterns can distinguish sources

# -----------------------------------------------------------
# Feature Engineering
# -----------------------------------------------------------
features:
  # Word-level TF-IDF — reduced from 100k to 50k to fight generalization gap
  word_tfidf:
    ngram_range: [1, 2]
    max_features: 50000
    min_df: 3              # raised from 2: remove hapax words that don't generalise
    max_df: 0.95
    sublinear_tf: true
    analyzer: "word"

  # Character-level TF-IDF — min_df lowered to 2 to expose rare but class-specific char patterns
  char_tfidf:
    ngram_range: [2, 6]
    max_features: 50000
    min_df: 2              # lowered from 4: rare char n-grams can distinguish DeepSeek/Grok
    max_df: 0.95
    sublinear_tf: true
    analyzer: "char_wb"

  # Stylometric hand-crafted features (43 features)
  stylometric:
    enabled: true

  # Function-word TF-IDF — style fingerprint, not topic
  # Uses a fixed ~130-word vocabulary of determiners, conjunctions, auxiliaries,
  # pronouns, and discourse markers.  Different LLMs use these at very distinct rates.
  function_word_tfidf:
    enabled: true
    sublinear_tf: true

# -----------------------------------------------------------
# Cross-Validation
# -----------------------------------------------------------
validation:
  n_splits: 5
  random_state: 42
  shuffle: true

# -----------------------------------------------------------
# Learning Curves
# -----------------------------------------------------------
learning_curve:
  enabled: false
  n_points: 6

# -----------------------------------------------------------
# Models
# -----------------------------------------------------------
models:
  run_models:
    - "two_stage_top2"                 # linear best: CV=0.9328 (reference)
    - "ensemble_mlp"                   # MLP+linear: CV OOF=0.9360 (Run 9 best)
    - "lgbm_svd"                       # NEW: gradient boosting in SVD space
    - "ensemble_lgbm"                  # NEW: lgbm + two_stage soft vote
    - "mlp_svd_calibrated_sigmoid"     # NEW: MLP + sigmoid calibration (isotonic FAILED)
    - "stacking_lgbm"                  # NEW: meta-learner on [two_stage+mlp+lgbm] OOF

  # NOTE: when run_cv=true, the CV winner OVERRIDES this setting.
  # This value is only used when run_cv=false (direct final training).
  best_model: "ensemble_mlp"

  # DeepSeek weight multiplier on top of 'balanced' for lr_deepseek_boost
  deepseek_boost: 2.0

  # Two-stage trigger and threshold settings (shared across all two_stage_* models)
  two_stage_margin_gap: 0.40      # only invoke binary when |P(DS)-P(Grok)| < gap
  two_stage_ds_threshold: 0.52    # binary needs P(DS) >= this to predict DeepSeek

  # ── LightGBM hyperparameters (used by lgbm_svd, ensemble_lgbm, stacking_lgbm)
  lgbm:
    n_svd_components: 300         # TruncatedSVD output dims (sparse → dense)
    n_estimators: 300             # number of boosting rounds
    num_leaves: 31                # tree complexity (31 = moderate, avoids overfit)
    learning_rate: 0.05           # shrinkage — slower but more generalizable
    min_child_samples: 10         # min samples per leaf — regularisation for small DS class
    subsample: 0.8                # row subsampling per tree
    colsample_bytree: 0.8         # feature subsampling per tree
    reg_alpha: 0.1                # L1 regularisation
    reg_lambda: 0.1               # L2 regularisation

  # ── MLP neural network hyperparameters (used by mlp_svd, mlp_svd_ds_boost, ensemble_mlp)
  mlp:
    n_svd_components: 500       # TruncatedSVD output dims (sparse → dense)
    hidden_layer_sizes: [512, 256]  # MLP hidden layer sizes
    alpha: 0.01                 # L2 regularization (default 0.0001 too weak for 2400 samples)
    max_iter: 300               # max training iterations
    early_stopping: true        # stop early if val loss stagnates for 15 epochs
    validation_fraction: 0.1    # fraction of training data held for early stopping
    deepseek_boost_factor: 1.0  # DS sample weight multiplier on top of balanced (1.0 = off)
    verbose: false              # set true to see MLP loss per iteration

  # ── Model hyperparameters ────────────────────────────────────────────────
  logistic_regression:
    C: 0.5
    max_iter: 1000
    solver: "lbfgs"
    class_weight: null

  logistic_regression_balanced:
    C: 0.5               # reduced from 1.0: more regularization
    max_iter: 1000
    solver: "lbfgs"
    # class_weight is forced to "balanced" in code

  linear_svc:
    C: 0.1
    max_iter: 2000
    class_weight: null

  linear_svc_balanced:
    C: 0.1
    max_iter: 2000

  calibrated_svc:
    C: 0.1
    max_iter: 2000
    class_weight: "balanced"

  sgd_log:
    alpha: 0.0001
    max_iter: 100

  sgd_hinge:
    alpha: 0.0001
    max_iter: 100

  ridge_classifier:
    alpha: 1.0
    class_weight: "balanced"

  passive_aggressive:
    C: 0.1
    max_iter: 1000
    class_weight: "balanced"

  complement_nb:
    alpha: 0.1

# -----------------------------------------------------------
# Training
# -----------------------------------------------------------
training:
  run_cv: true
  run_model_comparison: true
  save_artifacts: true
  verbose: true
  random_state: 42
  use_best_fold_model: false  # false = retrain on ALL 2400 samples (safer for LB)
  save_per_model_submissions: true  # generate per-model submission CSVs in exp folder

# -----------------------------------------------------------
# Error Analysis
# -----------------------------------------------------------
analysis:
  top_n_errors: 50
  save_confusion_matrix: true
  save_classification_report: true

# -----------------------------------------------------------
# Experiment Tracking
# -----------------------------------------------------------
experiment:
  enabled: true
  name_prefix: "run"

# -----------------------------------------------------------
# Kaggle / Environment
# -----------------------------------------------------------
environment:
  mode: "local"
  kaggle_input_dir: "/kaggle/input/malto-hackathon"
  kaggle_working_dir: "/kaggle/working"
