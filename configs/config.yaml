# ============================================================
# MALTO Text Authorship Detection — Configuration  (Run 7)
# ============================================================
# Run 6 results: CV 0.9328, two_stage_top2 winner. DS recall 0.61->0.70 (+0.09).
#   BUT: DS->Grok=21 (-6), Grok->DS=14 (+6). Net 35 total errors — same as before.
#   Only 5/600 test labels changed from Run 5 — too small for LB jump.
#
# Run 7 (target: net reduce DS+Grok total errors below 30):
#   - two_stage_top2_conservative: top2 trigger + natural binary weights (1:2 DS:Grok, C=0.8)
#     Goal: keep DS recall gain, recover the 6 extra Grok->DS errors
#   - two_stage_combined: GPT suggestion — top2 AND margin<0.30 (AND logic, most selective)
#     Goal: fire only when truly ambiguous, near-zero false positive risk
#   - ensemble_v2: soft vote of [two_stage_top2 + ensemble_soft]
#     Goal: complement DS recall (0.70) with Grok recall (0.93) from each model
# ============================================================

# -----------------------------------------------------------
# Paths
# -----------------------------------------------------------
paths:
  data_dir: "data"
  artifacts_dir: "artifacts"
  models_dir: "artifacts/models"
  metrics_dir: "artifacts/metrics"
  submissions_dir: "artifacts/submissions"
  analysis_dir: "artifacts/analysis"
  experiments_dir: "artifacts/experiments"
  logs_dir: "artifacts/logs"
  plots_dir: "artifacts/plots"

  train_file: "data/train.csv"
  test_file: "data/test.csv"
  sample_submission_file: "data/sample_submission.csv"

  best_model_file: "artifacts/models/best_model.joblib"

# -----------------------------------------------------------
# Preprocessing
# -----------------------------------------------------------
preprocessing:
  normalize_unicode: true
  strip_whitespace: true
  remove_repeated_spaces: true
  lowercase: false          # Keep False: capitalisation is a stylistic signal
  remove_punctuation: false # Keep False: punctuation is discriminative
  remove_numbers: false     # Keep False: numeric patterns can distinguish sources

# -----------------------------------------------------------
# Feature Engineering
# -----------------------------------------------------------
features:
  # Word-level TF-IDF — reduced from 100k to 50k to fight generalization gap
  word_tfidf:
    ngram_range: [1, 2]
    max_features: 50000
    min_df: 3              # raised from 2: remove hapax words that don't generalise
    max_df: 0.95
    sublinear_tf: true
    analyzer: "word"

  # Character-level TF-IDF — min_df lowered to 2 to expose rare but class-specific char patterns
  char_tfidf:
    ngram_range: [2, 6]
    max_features: 50000
    min_df: 2              # lowered from 4: rare char n-grams can distinguish DeepSeek/Grok
    max_df: 0.95
    sublinear_tf: true
    analyzer: "char_wb"

  # Stylometric hand-crafted features (43 features)
  stylometric:
    enabled: true

  # Function-word TF-IDF — style fingerprint, not topic
  # Uses a fixed ~130-word vocabulary of determiners, conjunctions, auxiliaries,
  # pronouns, and discourse markers.  Different LLMs use these at very distinct rates.
  function_word_tfidf:
    enabled: true
    sublinear_tf: true

# -----------------------------------------------------------
# Cross-Validation
# -----------------------------------------------------------
validation:
  n_splits: 5
  random_state: 42
  shuffle: true

# -----------------------------------------------------------
# Learning Curves
# -----------------------------------------------------------
learning_curve:
  enabled: false
  n_points: 6

# -----------------------------------------------------------
# Models
# -----------------------------------------------------------
models:
  run_models:
    - "ensemble_soft"                  # baseline: LB=0.91089, CV=0.9272
    - "two_stage_top2"                 # Run 6 winner: CV=0.9328, DS recall=0.70
    - "two_stage_top2_conservative"    # NEW: top2 + natural binary weights (less Grok->DS)
    - "two_stage_combined"             # NEW GPT: top2 AND margin<0.30 (AND logic)
    - "ensemble_v2"                    # NEW: soft vote top2 + ensemble_soft

  # NOTE: when run_cv=true, the CV winner OVERRIDES this setting.
  # This value is only used when run_cv=false (direct final training).
  best_model: "ensemble_soft"

  # DeepSeek weight multiplier on top of 'balanced' for lr_deepseek_boost
  deepseek_boost: 2.0

  # Two-stage trigger and threshold settings (shared across all two_stage_* models)
  two_stage_margin_gap: 0.40      # only invoke binary when |P(DS)-P(Grok)| < gap
  two_stage_ds_threshold: 0.52    # binary needs P(DS) >= this to predict DeepSeek

  # ── Model hyperparameters ────────────────────────────────────────────────
  logistic_regression:
    C: 0.5
    max_iter: 1000
    solver: "lbfgs"
    class_weight: null

  logistic_regression_balanced:
    C: 0.5               # reduced from 1.0: more regularization
    max_iter: 1000
    solver: "lbfgs"
    # class_weight is forced to "balanced" in code

  linear_svc:
    C: 0.1
    max_iter: 2000
    class_weight: null

  linear_svc_balanced:
    C: 0.1
    max_iter: 2000

  calibrated_svc:
    C: 0.1
    max_iter: 2000
    class_weight: "balanced"

  sgd_log:
    alpha: 0.0001
    max_iter: 100

  sgd_hinge:
    alpha: 0.0001
    max_iter: 100

  ridge_classifier:
    alpha: 1.0
    class_weight: "balanced"

  passive_aggressive:
    C: 0.1
    max_iter: 1000
    class_weight: "balanced"

  complement_nb:
    alpha: 0.1

# -----------------------------------------------------------
# Training
# -----------------------------------------------------------
training:
  run_cv: true
  run_model_comparison: true
  save_artifacts: true
  verbose: true
  random_state: 42
  use_best_fold_model: false  # false = retrain on ALL 2400 samples (safer for LB)

# -----------------------------------------------------------
# Error Analysis
# -----------------------------------------------------------
analysis:
  top_n_errors: 50
  save_confusion_matrix: true
  save_classification_report: true

# -----------------------------------------------------------
# Experiment Tracking
# -----------------------------------------------------------
experiment:
  enabled: true
  name_prefix: "run"

# -----------------------------------------------------------
# Kaggle / Environment
# -----------------------------------------------------------
environment:
  mode: "local"
  kaggle_input_dir: "/kaggle/input/malto-hackathon"
  kaggle_working_dir: "/kaggle/working"
