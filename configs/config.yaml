# ============================================================
# MALTO Text Authorship Detection — Configuration  (Run 6)
# ============================================================
# Run 5 results: LB 0.91089 (same as Run 4) — ensemble_two_stage & two_stage_conservative
#   did not improve over ensemble_soft. DS->Grok=27 still the main problem.
#
# Run 6 changes (target: >0.93 LB — fix DeepSeek recall):
#   - 43 stylometric features (up from 37): first_sent_words, proper_noun_density,
#     hedge_rate, question_per_sent, sent_range, text_len_log
#   - two_stage_top2: fires ONLY when DS and Grok are BOTH top-2 predicted classes
#     (more precise than margin trigger — avoids false triggers when Grok is clear)
#   - DS/Grok pair-specific threshold: optimized ratio P(DS)/(P(DS)+P(Grok))
#     applied as post-processor after global thresholds — only affects DS/Grok boundary
#   - Bug fix: stale thresholds warning in main_infer.py
#   - Bug fix: single-model CV now saves thresholds
# ============================================================

# -----------------------------------------------------------
# Paths
# -----------------------------------------------------------
paths:
  data_dir: "data"
  artifacts_dir: "artifacts"
  models_dir: "artifacts/models"
  metrics_dir: "artifacts/metrics"
  submissions_dir: "artifacts/submissions"
  analysis_dir: "artifacts/analysis"
  experiments_dir: "artifacts/experiments"
  logs_dir: "artifacts/logs"
  plots_dir: "artifacts/plots"

  train_file: "data/train.csv"
  test_file: "data/test.csv"
  sample_submission_file: "data/sample_submission.csv"

  best_model_file: "artifacts/models/best_model.joblib"

# -----------------------------------------------------------
# Preprocessing
# -----------------------------------------------------------
preprocessing:
  normalize_unicode: true
  strip_whitespace: true
  remove_repeated_spaces: true
  lowercase: false          # Keep False: capitalisation is a stylistic signal
  remove_punctuation: false # Keep False: punctuation is discriminative
  remove_numbers: false     # Keep False: numeric patterns can distinguish sources

# -----------------------------------------------------------
# Feature Engineering
# -----------------------------------------------------------
features:
  # Word-level TF-IDF — reduced from 100k to 50k to fight generalization gap
  word_tfidf:
    ngram_range: [1, 2]
    max_features: 50000
    min_df: 3              # raised from 2: remove hapax words that don't generalise
    max_df: 0.95
    sublinear_tf: true
    analyzer: "word"

  # Character-level TF-IDF — min_df lowered to 2 to expose rare but class-specific char patterns
  char_tfidf:
    ngram_range: [2, 6]
    max_features: 50000
    min_df: 2              # lowered from 4: rare char n-grams can distinguish DeepSeek/Grok
    max_df: 0.95
    sublinear_tf: true
    analyzer: "char_wb"

  # Stylometric hand-crafted features (43 features)
  stylometric:
    enabled: true

  # Function-word TF-IDF — style fingerprint, not topic
  # Uses a fixed ~130-word vocabulary of determiners, conjunctions, auxiliaries,
  # pronouns, and discourse markers.  Different LLMs use these at very distinct rates.
  function_word_tfidf:
    enabled: true
    sublinear_tf: true

# -----------------------------------------------------------
# Cross-Validation
# -----------------------------------------------------------
validation:
  n_splits: 5
  random_state: 42
  shuffle: true

# -----------------------------------------------------------
# Learning Curves
# -----------------------------------------------------------
learning_curve:
  enabled: false
  n_points: 6

# -----------------------------------------------------------
# Models
# -----------------------------------------------------------
models:
  run_models:
    - "ensemble_soft"                  # Run 4/5 winner: LB=0.91089, CV=0.9321
    - "two_stage_top2"                 # NEW Run 6: top-2 trigger (DS+Grok must be top-2)
    - "logistic_regression_balanced"   # Fast baseline for comparison
    - "lr_deepseek_boost"              # DS class weight 2x beyond balanced

  # NOTE: when run_cv=true, the CV winner OVERRIDES this setting.
  # This value is only used when run_cv=false (direct final training).
  best_model: "ensemble_soft"

  # DeepSeek weight multiplier on top of 'balanced' for lr_deepseek_boost
  deepseek_boost: 2.0

  # Two-stage trigger and threshold settings (shared across all two_stage_* models)
  two_stage_margin_gap: 0.40      # only invoke binary when |P(DS)-P(Grok)| < gap
  two_stage_ds_threshold: 0.52    # binary needs P(DS) >= this to predict DeepSeek

  # ── Model hyperparameters ────────────────────────────────────────────────
  logistic_regression:
    C: 0.5
    max_iter: 1000
    solver: "lbfgs"
    class_weight: null

  logistic_regression_balanced:
    C: 0.5               # reduced from 1.0: more regularization
    max_iter: 1000
    solver: "lbfgs"
    # class_weight is forced to "balanced" in code

  linear_svc:
    C: 0.1
    max_iter: 2000
    class_weight: null

  linear_svc_balanced:
    C: 0.1
    max_iter: 2000

  calibrated_svc:
    C: 0.1
    max_iter: 2000
    class_weight: "balanced"

  sgd_log:
    alpha: 0.0001
    max_iter: 100

  sgd_hinge:
    alpha: 0.0001
    max_iter: 100

  ridge_classifier:
    alpha: 1.0
    class_weight: "balanced"

  passive_aggressive:
    C: 0.1
    max_iter: 1000
    class_weight: "balanced"

  complement_nb:
    alpha: 0.1

# -----------------------------------------------------------
# Training
# -----------------------------------------------------------
training:
  run_cv: true
  run_model_comparison: true
  save_artifacts: true
  verbose: true
  random_state: 42
  use_best_fold_model: false  # false = retrain on ALL 2400 samples (safer for LB)

# -----------------------------------------------------------
# Error Analysis
# -----------------------------------------------------------
analysis:
  top_n_errors: 50
  save_confusion_matrix: true
  save_classification_report: true

# -----------------------------------------------------------
# Experiment Tracking
# -----------------------------------------------------------
experiment:
  enabled: true
  name_prefix: "run"

# -----------------------------------------------------------
# Kaggle / Environment
# -----------------------------------------------------------
environment:
  mode: "local"
  kaggle_input_dir: "/kaggle/input/malto-hackathon"
  kaggle_working_dir: "/kaggle/working"
