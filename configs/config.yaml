# ============================================================
# MALTO Text Authorship Detection — Final Configuration
# ============================================================
# Best confirmed LB: 0.92422 (Run 10, stacking_lgbm, 2026-03-16)
# Best submission:   artifacts/submissions/submission_latest.csv  (= 0.92422 file)
#
# Run 10 exact config (verified from config_snapshot.yaml):
#   - LGBM 300/300/31
#   - function_word_tfidf: enabled, no ngram_range (→ fixed [1,1] vocabulary)
#   - ds_grok_tfidf: disabled (was NOT in Run 10 despite HANDOFF claiming otherwise)
#   - delex_tfidf: disabled (was NOT in Run 10)
#   - char_tfidf_micro: disabled (was NOT in Run 10)
#   - Thresholds: [2.25, 0.75, 1.0, 1.0, 2.5, 1.75], ds_grok_pair=0.55
#
# Lesson learned (Run 18): adding ds_grok/delex/fw[1,3] based on wrong HANDOFF
#   info regressed LB from 0.92422 to 0.90984. Run 10 features were simpler.
# ============================================================

# -----------------------------------------------------------
# Paths
# -----------------------------------------------------------
paths:
  data_dir: "data"
  artifacts_dir: "artifacts"
  models_dir: "artifacts/models"
  metrics_dir: "artifacts/metrics"
  submissions_dir: "artifacts/submissions"
  analysis_dir: "artifacts/analysis"
  experiments_dir: "artifacts/experiments"
  logs_dir: "artifacts/logs"
  plots_dir: "artifacts/plots"

  train_file: "data/train.csv"
  test_file: "data/test.csv"
  sample_submission_file: "data/sample_submission.csv"

  best_model_file: "artifacts/models/best_model.joblib"

# -----------------------------------------------------------
# Preprocessing
# -----------------------------------------------------------
preprocessing:
  normalize_unicode: true
  strip_whitespace: true
  remove_repeated_spaces: true
  lowercase: false          # Keep False: capitalisation is a stylistic signal
  remove_punctuation: false # Keep False: punctuation is discriminative
  remove_numbers: false     # Keep False: numeric patterns can distinguish sources

# -----------------------------------------------------------
# Feature Engineering
# -----------------------------------------------------------
features:
  # Word-level TF-IDF — reduced from 100k to 50k to fight generalization gap
  word_tfidf:
    ngram_range: [1, 2]
    max_features: 50000
    min_df: 3              # raised from 2: remove hapax words that don't generalise
    max_df: 0.95
    sublinear_tf: true
    analyzer: "word"

  # Character-level TF-IDF — min_df lowered to 2 to expose rare but class-specific char patterns
  char_tfidf:
    ngram_range: [2, 6]
    max_features: 50000
    min_df: 2              # lowered from 4: rare char n-grams can distinguish DeepSeek/Grok
    max_df: 0.95
    sublinear_tf: true
    analyzer: "char_wb"

  # Stylometric hand-crafted features (43 features)
  stylometric:
    enabled: true

  # Character micro TF-IDF — DISABLED for Run 15 to test if it caused regression.
  # Run 10 (CV 0.9393) did NOT have char_tfidf_micro.
  # All runs since Run 11 added it and CV declined (0.9393->0.9370->0.9339->0.9271->0.9214).
  # Hypothesis: overlapping char ngram ranges (2-6 char_wb + 3-7 char) add noise to LR.
  char_tfidf_micro:
    enabled: false
    ngram_range: [3, 7]
    max_features: 20000
    min_df: 2
    analyzer: "char"
    sublinear_tf: true

  # Function-word TF-IDF — style fingerprint, not topic.
  # Run 10 config (LB 0.92422): no ngram_range → uses fixed 151-word vocabulary (unigrams).
  # Do NOT add ngram_range here — the code falls back to vocabulary=FUNCTION_WORDS when
  # ngram_range is [1,1], which is the stable proven approach.
  function_word_tfidf:
    enabled: true
    sublinear_tf: true

  # DS/Grok subspace TF-IDF — NOT in Run 10 (LB 0.92422).
  # Keep disabled: was never tested in isolation and hurt LB when added in Run 18.
  ds_grok_tfidf:
    enabled: false
    ngram_range: [1, 3]
    max_features: 10000
    min_df: 1

  # Delexicalized TF-IDF — NOT in Run 10 (LB 0.92422).
  # Keep disabled: was never tested in isolation.
  delex_tfidf:
    enabled: false
    ngram_range: [1, 2]
    max_features: 30000
    min_df: 2

# -----------------------------------------------------------
# Cross-Validation
# -----------------------------------------------------------
validation:
  n_splits: 5
  random_state: 42
  shuffle: true

# -----------------------------------------------------------
# Learning Curves
# -----------------------------------------------------------
learning_curve:
  enabled: false
  n_points: 6

# -----------------------------------------------------------
# Models
# -----------------------------------------------------------
models:
  run_models:
    - "two_stage_top2"                 # reference: CV=0.9208 (Run 18)
    - "stacking_lgbm"                  # best model: CV=0.9393 (Run 10), LB=0.92422

  # NOTE: when run_cv=true, the CV winner OVERRIDES this setting.
  # This value is only used when run_cv=false (direct final training).
  best_model: "stacking_lgbm"   # Best LB: 0.92422 (Run 10)

  # DeepSeek weight multiplier on top of 'balanced' for lr_deepseek_boost
  deepseek_boost: 2.0

  # Two-stage trigger and threshold settings (shared across all two_stage_* models)
  two_stage_margin_gap: 0.40      # only invoke binary when |P(DS)-P(Grok)| < gap
  two_stage_ds_threshold: 0.52    # binary needs P(DS) >= this to predict DeepSeek

  # ── LightGBM hyperparameters (used by lgbm_svd, ensemble_lgbm, stacking_lgbm, stacking_lgbm_v2)
  # Run 18: reverted to 300/300/31 — this is the Run 10 config (LB=0.92422).
  # 500/500/63 (Run 17) overfits StackingClassifier's inner 3-fold training sets
  # (~1600 samples, ~64 DS) → noisy meta-features → LB dropped to 0.90430.
  lgbm:
    n_svd_components: 300         # Run 10 value — smaller SVD, less overfit inner folds
    n_estimators: 300             # Run 10 value — fewer trees, less overfit
    num_leaves: 31                # Run 10 value (LGBM default) — shallower trees
    learning_rate: 0.05           # shrinkage — slower but more generalizable
    min_child_samples: 10         # min samples per leaf — regularisation for small DS class
    subsample: 0.8                # row subsampling per tree
    colsample_bytree: 0.8         # feature subsampling per tree
    reg_alpha: 0.1                # L1 regularisation
    reg_lambda: 0.1               # L2 regularisation

  # ── XGBoost hyperparameters (used by xgb_svd, stacking_lgbm_v3)
  xgb:
    n_svd_components: 300         # TruncatedSVD dims (lighter than LGBM's 500 — XGB is slower)
    n_estimators: 300             # boosting rounds
    max_depth: 6                  # depth-wise tree growth (vs LGBM leaf-wise)
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 0.1                # L1 regularisation
    reg_lambda: 1.0               # L2 regularisation (XGBoost default = 1.0)
    min_child_weight: 3           # min sum of instance weights in a leaf

  # ── MLP neural network hyperparameters (used by mlp_svd, mlp_svd_ds_boost, ensemble_mlp)
  mlp:
    n_svd_components: 500       # TruncatedSVD output dims (sparse → dense)
    hidden_layer_sizes: [512, 256]  # MLP hidden layer sizes
    alpha: 0.01                 # L2 regularization (default 0.0001 too weak for 2400 samples)
    max_iter: 300               # max training iterations
    early_stopping: true        # stop early if val loss stagnates for 15 epochs
    validation_fraction: 0.1    # fraction of training data held for early stopping
    deepseek_boost_factor: 1.0  # DS sample weight multiplier on top of balanced (1.0 = off)
    verbose: false              # set true to see MLP loss per iteration

  # ── Model hyperparameters ────────────────────────────────────────────────
  logistic_regression:
    C: 0.5
    max_iter: 1000
    solver: "lbfgs"
    class_weight: null

  logistic_regression_balanced:
    C: 0.5               # reduced from 1.0: more regularization
    max_iter: 1000
    solver: "lbfgs"
    # class_weight is forced to "balanced" in code

  linear_svc:
    C: 0.1
    max_iter: 2000
    class_weight: null

  linear_svc_balanced:
    C: 0.1
    max_iter: 2000

  calibrated_svc:
    C: 0.1
    max_iter: 2000
    class_weight: "balanced"

  sgd_log:
    alpha: 0.0001
    max_iter: 100

  sgd_hinge:
    alpha: 0.0001
    max_iter: 100

  ridge_classifier:
    alpha: 1.0
    class_weight: "balanced"

  passive_aggressive:
    C: 0.1
    max_iter: 1000
    class_weight: "balanced"

  complement_nb:
    alpha: 0.1

# -----------------------------------------------------------
# Training
# -----------------------------------------------------------
training:
  run_cv: true
  run_model_comparison: true
  save_artifacts: true
  verbose: true
  random_state: 42
  use_best_fold_model: false  # false = retrain on ALL 2400 samples (safer for LB)

# -----------------------------------------------------------
# Error Analysis
# -----------------------------------------------------------
analysis:
  top_n_errors: 50
  save_confusion_matrix: true
  save_classification_report: true

# -----------------------------------------------------------
# Experiment Tracking
# -----------------------------------------------------------
experiment:
  enabled: true
  name_prefix: "run"

# -----------------------------------------------------------
# Kaggle / Environment
# -----------------------------------------------------------
environment:
  mode: "local"
  kaggle_input_dir: "/kaggle/input/malto-hackathon"
  kaggle_working_dir: "/kaggle/working"
